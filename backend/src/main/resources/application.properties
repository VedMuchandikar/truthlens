spring.application.name=backend
# Server
server.port=8080
spring.application.name=truthlens-backend

# H2 in-memory DB (Phase 1 — swap to PostgreSQL in Phase 2)
spring.datasource.url=jdbc:h2:mem:truthlensdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ML Service URL (override via env var in Docker)
ml.service.base-url=${ML_SERVICE_URL:http://localhost:8000}
ml.service.timeout-seconds=30

# CORS
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000